<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Добавить объявление</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-storage.js"></script>
</head>
<body>
    <header>
        <div class="logo">Доска объявлений</div>
        <nav>
            <ul>
                <li><a href="index.html">Главная</a></li>
                <li><a href="services.html">Услуги</a></li>
            </ul>
        </nav>
    </header>
    
    <div class="container">
        <form id="adForm">
            <h2>Добавить объявление</h2>
            <div class="form-group">
                <label for="photos">Фото</label>
                <input type="file" id="photos" multiple accept="image/*">
            </div>
            <div class="form-group">
                <label for="title">Название объявления</label>
                <input type="text" id="title" placeholder="Продам курячі яйца" required>
            </div>
            <div class="form-group">
                <label for="category">Категория</label>
                <select id="category" required>
                    <option value="auto">Авто/Мото/Вело</option>
                    <option value="clothing">Одяг, взуття та інше</option>
                    <option value="fruits">Фрукти та овочі</option>
                    <option value="grain">Зерно та корма</option>
                    <option value="food">Продукти харчування</option>
                    <option value="animals">Тварини та препарати</option>
                    <option value="tools">Интструменти та запчастини</option>
                    <option value="garden">Сад та город</option>
                    <option value="cosmetics">Косметика</option>
                    <option value="chemicals">Побутова хімія</option>
                    <option value="other">Інше</option>
                </select>
            </div>
            <div class="form-group">
                <label for="price">Цена</label>
                <input type="number" id="price" required>
                <label for="quantity">Количество</label>
                <input type="number" id="quantity" required>
                <label for="unit">Единица измерения</label>
                <select id="unit" required>
                    <option value="kg">Кілограм</option>
                    <option value="pcs">Штук</option>
                    <option value="liters">Літр(ів)</option>
                    <option value="meters">Метрів</option>
                    <option value="grams">Грам</option>
                    <option value="m2">Метр2</option>
                    <option value="m3">Метр3</option>
                </select>
            </div>
            <div id="additionalFieldsContainer">
                <div class="form-group">
                    <button type="button" onclick="addAdditionalField()">Добавить поле для доп. информации</button>
                </div>
            </div>
            <div class="form-group">
                <label for="description">Описание</label>
                <textarea id="description" required></textarea>
            </div>
            <div class="form-group">
                <label for="name">Имя продавца</label>
                <input type="text" id="name" required>
            </div>
            <div class="form-group">
                <label for="phone">Номер телефона</label>
                <input type="text" id="phone" required>
                <div>
                    <input type="checkbox" id="viber"> Вайбер
                    <input type="checkbox" id="telegram"> Телеграм
                    <input type="checkbox" id="whatsapp"> Вацап
                </div>
            </div>
            <div class="form-group">
                <label for="location">Я живу в:</label>
                <select id="location" required>
                    <option value="Zorya">Зоря</option>
                    <option value="Balovka">Баловка</option>
                    <option value="Loboykovka">Лобойковка</option>
                    <option value="Petrikovka">Петриковка</option>
                    <option value="Partizansk">Партизанск</option>
                    <option value="Chumaki">Чумаки</option>
                </select>
                <label for="address">По адресу</label>
                <input type="text" id="address">
            </div>
            <button type="submit">Добавить объявление</button>
        </form>
    </div>
    
    <footer>
        <p>© 2024 Доска объявлений</p>
    </footer>

    <script src="script.js"></script>
    <script>
        // Your Firebase configuration
        var firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_AUTH_DOMAIN",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_STORAGE_BUCKET",
            messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
            appId: "YOUR_APP_ID"
        };
        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
    </script>
</body>
</html>
