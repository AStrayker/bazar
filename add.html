<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Додати Оголошення</title>
    <link rel="stylesheet" href="styles.css">
    <!-- Firebase App (the core Firebase SDK) is always required and must be listed first -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <!-- Add Firebase products that you want to use -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-storage.js"></script>
</head>
<body>
    <div class="container">
        <button id="toggleTheme">Змінити фон</button>
        <h1>Додати Оголошення</h1>
        <form id="addAdForm">
            <label for="photos">Фото (до 5 фото):</label>
            <input type="file" id="photos" name="photos" accept="image/*" multiple>
            
            <label for="title">Назва оголошення:</label>
            <input type="text" id="title" name="title" placeholder="Продам курячі яйца" required>

            <label for="price">Ціна:</label>
            <input type="number" id="price" name="price" placeholder="50 грн" required>
            
            <label for="quantity">Кількість:</label>
            <input type="number" id="quantity" name="quantity" placeholder="10" required>

            <label for="unit">Одиниця виміру:</label>
            <select id="unit" name="unit">
                <option value="Кілограм">Кілограм</option>
                <option value="Штук">Штук</option>
                <option value="Літр(ів)">Літр(ів)</option>
                <option value="Метрів">Метрів</option>
                <option value="Грам">Грам</option>
                <option value="Метр2">Метр2</option>
                <option value="Метр3">Метр3</option>
            </select>

            <label for="additionalFields">Додаткові поля:</label>
            <div id="additionalFields"></div>
            <button type="button" id="addFieldButton">Додати поле для доп. інформації</button>

            <label for="description">Опис:</label>
            <textarea id="description" name="description"></textarea>

            <label for="sellerName">Ім'я продавця:</label>
            <input type="text" id="sellerName" name="sellerName" required>

            <label for="phoneNumber">Номер телефону:</label>
            <input type="tel" id="phoneNumber" name="phoneNumber" required>
            <div>
                <label for="viber">Вайбер</label>
                <input type="checkbox" id="viber" name="messenger" value="viber">
                <label for="telegram">Телеграм</label>
                <input type="checkbox" id="telegram" name="messenger" value="telegram">
                <label for="whatsapp">Вацап</label>
                <input type="checkbox" id="whatsapp" name="messenger" value="whatsapp">
            </div>

            <label for="region">Я живу в:</label>
            <select id="region" name="region">
                <option value="Зоря">Зоря</option>
                <option value="Баловка">Баловка</option>
                <option value="Лобойковка">Лобойковка</option>
                <option value="Петриковка">Петриковка</option>
                <option value="Партизанск">Партизанск</option>
                <option value="Чумаки">Чумаки</option>
            </select>

            <label for="address">По адресу:</label>
            <input type="text" id="address" name="address">

            <button type="submit">Додати оголошення</button>
        </form>
    </div>
    <script src="scripts.js"></script>
    <script>
        // Your Firebase configuration
        var firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_AUTH_DOMAIN",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_STORAGE_BUCKET",
            messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
            appId: "YOUR_APP_ID"
        };
        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const storage = firebase.storage();

        document.getElementById('addAdForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            // Get form data
            const title = document.getElementById('title').value;
            const price = document.getElementById('price').value;
            const quantity = document.getElementById('quantity').value;
            const unit = document.getElementById('unit').value;
            const description = document.getElementById('description').value;
            const sellerName = document.getElementById('sellerName').value;
            const phoneNumber = document.getElementById('phoneNumber').value;
            const region = document.getElementById('region').value;
            const address = document.getElementById('address').value;

            const photos = document.getElementById('photos').files;
            const photoUrls = [];

            for (let i = 0; i < photos.length; i++) {
                const file = photos[i];
                const storageRef = storage.ref();
                const photoRef = storageRef.child(`photos/${file.name}`);
                await photoRef.put(file);
                const photoUrl = await photoRef.getDownloadURL();
                photoUrls.push(photoUrl);
            }

            // Save ad to Firestore
            await db.collection('ads').add({
                title,
                price,
                quantity,
                unit,
                description,
                sellerName,
                phoneNumber,
                region,
                address,
                photos: photoUrls,
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });

            alert('Оголошення додано успішно!');
            document.getElementById('addAdForm').reset();
        });
    </script>
</body>
</html>
