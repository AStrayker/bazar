<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Додати оголошення</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>Додати оголошення</h1>
        <form id="ad-form">
            <div class="photo-upload">
                <label for="photos">Перетягніть фото або натисніть на кнопку</label>
                <input type="file" id="photos" name="photos" accept="image/*" multiple required>
                <div id="photo-preview"></div>
            </div>

            <div class="form-group">
                <label for="title">Назва оголошення</label>
                <input type="text" id="title" name="title" placeholder="Продам курячі яйця" required>
            </div>

            <div class="form-group">
                <label for="category">Категорія оголошення</label>
                <select id="category" name="category" required>
                    <option value="Авто/Мото/Вело">Авто/Мото/Вело</option>
                    <option value="Одяг, взуття та інше">Одяг, взуття та інше</option>
                    <option value="Фрукти та овочі">Фрукти та овочі</option>
                    <option value="Зерно та корма">Зерно та корма</option>
                    <option value="Продукти харчування">Продукти харчування</option>
                    <option value="Тварини та препарати">Тварини та препарати</option>
                    <option value="Інструменти та запчастини">Інструменти та запчастини</option>
                    <option value="Сад та город">Сад та город</option>
                    <option value="Косметика">Косметика</option>
                    <option value="Побутова хімія">Побутова хімія</option>
                    <option value="Інше">Інше</option>
                </select>
            </div>

            <div class="form-group">
                <label for="price">Ціна</label>
                <input type="number" id="price" name="price" placeholder="50 грн" required>

                <label for="quantity">Кількість</label>
                <input type="number" id="quantity" name="quantity" required>

                <label for="unit">Одиниця виміру</label>
                <select id="unit" name="unit" required>
                    <option value="Кілограм">Кілограм</option>
                    <option value="Штук">Штук</option>
                    <option value="Літр(ів)">Літр(ів)</option>
                    <option value="Метрів">Метрів</option>
                    <option value="Грам">Грам</option>
                    <option value="Метр2">Метр2</option>
                    <option value="Метр3">Метр3</option>
                </select>
            </div>

            <div class="additional-fields">
                <label>Додаткові поля (макс. 15):</label>
                <div id="extra-fields"></div>
                <button type="button" id="add-field">Додати поле для дод. інформації</button>
            </div>

            <div class="form-group">
                <label for="description">Опис</label>
                <textarea id="description" name="description"></textarea>
            </div>

            <div class="form-group">
                <label for="seller-name">Ім'я продавця</label>
                <input type="text" id="seller-name" name="seller-name" required>
            </div>

            <div class="form-group">
                <label for="phone">Номер телефону</label>
                <input type="tel" id="phone" name="phone" required>

                <label>Месенджери</label>
                <input type="checkbox" id="viber" name="messengers" value="Viber">
                <label for="viber">Viber</label>
                <input type="checkbox" id="telegram" name="messengers" value="Telegram">
                <label for="telegram">Telegram</label>
                <input type="checkbox" id="whatsapp" name="messengers" value="WhatsApp">
                <label for="whatsapp">WhatsApp</label>
            </div>

            <div class="form-group">
                <label for="region">Я живу в</label>
                <select id="region" name="region" required>
                    <option value="Баловка">Баловка</option>
                    <option value="Зоря">Зоря</option>
                    <option value="Лобойковка">Лобойковка</option>
                    <option value="Петриковка">Петриковка</option>
                    <option value="Партизанск">Партизанск</option>
                    <option value="Чумаки">Чумаки</option>
                </select>
            </div>

            <div class="form-group">
                <label for="address">По адресу</label>
                <input type="text" id="address" name="address" placeholder="Необов'язково">
            </div>

            <button type="submit">Додати оголошення</button>
        </form>
    </div>

    <script src="script.js"></script>
</body>
</html>
