<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Добавить объявление</title>
    <link rel="stylesheet" href="styles.css">
    <!-- Firebase App (the core Firebase SDK) is always required and must be listed first -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <!-- Add Firebase products that you want to use -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-storage.js"></script>
</head>
<body>
    <header>
        <div class="logo">Доска объявлений</div>
        <nav>
            <ul>
                <li><a href="index.html">Главная</a></li>
                <li><a href="services.html">Услуги</a></li>
            </ul>
        </nav>
        <div class="menu-icon" onclick="toggleSidebar()">☰</div>
    </header>
    
    <div class="container">
        <h1>Добавить объявление</h1>
        <form id="ad-form">
            <div>
                <label for="images">Фото (до 5 фото):</label>
                <input type="file" id="images" name="images" multiple accept="image/*" required>
            </div>
            <div>
                <label for="title">Название объявления:</label>
                <input type="text" id="title" name="title" placeholder="Продам курячі яйца" required>
            </div>
            <div>
                <label for="price">Цена:</label>
                <input type="number" id="price" name="price" required>
                <label for="quantity">Количество:</label>
                <input type="number" id="quantity" name="quantity" required>
                <label for="unit">Един. измерения:</label>
                <select id="unit" name="unit">
                    <option value="kg">Кілограм</option>
                    <option value="pcs">Штук</option>
                    <option value="l">Літр(ів)</option>
                    <option value="m">Метрів</option>
                    <option value="g">Грам</option>
                    <option value="m2">Метр2</option>
                    <option value="m3">Метр3</option>
                </select>
            </div>
            <div>
                <label for="additional-fields">Дополнительные поля:</label>
                <div id="additional-fields"></div>
                <button type="button" onclick="addAdditionalField()">Добавить поле для доп. информации</button>
            </div>
            <div>
                <label for="description">Описание:</label>
                <textarea id="description" name="description"></textarea>
            </div>
            <div>
                <label for="seller-name">Имя продавца:</label>
                <input type="text" id="seller-name" name="seller-name" required>
            </div>
            <div>
                <label for="phone">Номер телефона:</label>
                <input type="tel" id="phone" name="phone" required>
                <label for="viber">Вайбер</label>
                <input type="checkbox" id="viber" name="messenger" value="viber">
                <label for="telegram">Телеграм</label>
                <input type="checkbox" id="telegram" name="messenger" value="telegram">
                <label for="whatsapp">Вацап</label>
                <input type="checkbox" id="whatsapp" name="messenger" value="whatsapp">
            </div>
            <div>
                <label for="region">Район:</label>
                <select id="region" name="region">
                    <option value="Zorya">Зоря</option>
                    <option value="Balovka">Баловка</option>
                    <option value="Loboykovka">Лобойковка</option>
                    <option value="Petrikovka">Петриковка</option>
                    <option value="Partizansk">Партизанск</option>
                    <option value="Chumaki">Чумаки</option>
                </select>
            </div>
            <div>
                <label for="address">Адрес:</label>
                <input type="text" id="address" name="address">
            </div>
            <button type="submit">Добавить объявление</button>
        </form>
    </div>
    
    <footer>
        <p>© 2024 Доска объявлений</p>
    </footer>

    <script src="script.js"></script>
    <script>
        // Your Firebase configuration
        var firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_AUTH_DOMAIN",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_STORAGE_BUCKET",
            messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
            appId: "YOUR_APP_ID"
        };
        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
    </script>
</body>
</html>
