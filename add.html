<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Доска объявлений</title>
    <style>
        body {
            background-color: white;
            color: black;
        }
        .container {
            max-width: 800px;
            margin: auto;
            padding: 20px;
            background-color: #f9f9f9;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        .btn-toggle-theme {
            background-color: #333;
            color: #fff;
            padding: 10px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        .btn-add-field {
            margin-top: 10px;
            background-color: #28a745;
            color: white;
            padding: 10px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        .btn-remove-field {
            background-color: #dc3545;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <button class="btn-toggle-theme" onclick="toggleTheme()">Сменить фон</button>
        <form id="adForm">
            <label for="photos">Фотографии (до 5 фото):</label>
            <input type="file" id="photos" name="photos" accept="image/*" multiple required><br><br>

            <label for="title">Название объявления:</label>
            <input type="text" id="title" name="title" placeholder="Продам курячі яйца" required><br><br>

            <label for="category">Категория:</label>
            <select id="category" name="category">
                <option value="Авто/Мото/Вело">Авто/Мото/Вело</option>
                <option value="Одежда, взуття та інше">Одежда, взуття та інше</option>
                <!-- Добавьте больше опций при необходимости -->
            </select><br><br>

            <label for="price">Цена:</label>
            <input type="number" id="price" name="price" required> грн

            <label for="quantity">Количество:</label>
            <input type="number" id="quantity" name="quantity" required>

            <label for="unit">Единица измерения:</label>
            <select id="unit" name="unit">
                <option value="Кілограм">Кілограм</option>
                <option value="Штук">Штук</option>
                <option value="Літр(ів)">Літр(ів)</option>
                <option value="Метрів">Метрів</option>
                <option value="Грам">Грам</option>
                <option value="Метр2">Метр2</option>
                <option value="Метр3">Метр3</option>
            </select><br><br>

            <label for="additional-fields">Дополнительная информация:</label>
            <div id="additional-fields"></div>
            <button type="button" class="btn-add-field" onclick="addField()">Добавить поле для доп. информации</button><br><br>

            <label for="description">Описание:</label>
            <textarea id="description" name="description"></textarea><br><br>

            <label for="name">Имя продавца:</label>
            <input type="text" id="name" name="name" required><br><br>

            <label for="phone">Номер телефона:</label>
            <input type="tel" id="phone" name="phone" required>
            <label for="messenger">У меня есть:</label>
            <input type="checkbox" id="viber" name="messenger" value="Viber"> Viber
            <input type="checkbox" id="telegram" name="messenger" value="Telegram"> Telegram
            <input type="checkbox" id="whatsapp" name="messenger" value="WhatsApp"> WhatsApp<br><br>

            <label for="district">Район:</label>
            <select id="district" name="district">
                <option value="Баловка">Баловка</option>
                <option value="Зоря">Зоря</option>
                <!-- Добавьте больше опций при необходимости -->
            </select><br><br>

            <label for="address">Адрес:</label>
            <input type="text" id="address" name="address"><br><br>

            <button type="submit">Подать объявление</button>
        </form>
    </div>

    <script>
        function toggleTheme() {
            const body = document.body;
            if (body.style.backgroundColor === 'white') {
                body.style.backgroundColor = 'black';
                body.style.color = 'white';
            } else {
                body.style.backgroundColor = 'white';
                body.style.color = 'black';
            }
        }

        function addField() {
            const additionalFields = document.getElementById('additional-fields');
            const fieldCount = additionalFields.children.length / 3;
            if (fieldCount < 15) {
                const fieldDiv = document.createElement('div');
                fieldDiv.innerHTML = `
                    <input type="text" name="additionalField${fieldCount}Name" placeholder="Название поля">
                    <input type="text" name="additionalField${fieldCount}Value" placeholder="Информация">
                    <button type="button" class="btn-remove-field" onclick="removeField(this)">Удалить</button><br><br>
                `;
                additionalFields.appendChild(fieldDiv);
            }
        }

        function removeField(button) {
            button.parentElement.remove();
        }
    </script>
</body>
</html>
