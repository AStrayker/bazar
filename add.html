<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Добавить объявление</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <div class="logo">Доска объявлений</div>
        <nav>
            <ul>
                <li><a href="index.html">Главная</a></li>
                <li><a href="services.html">Услуги</a></li>
            </ul>
        </nav>
    </header>

    <div class="container">
        <main>
            <h1>Добавить объявление</h1>
            <form id="ad-form">
                <label for="ad-photos">Фото:</label>
                <input type="file" id="ad-photos" name="photos" multiple accept="image/*" required>

                <label for="ad-title">Название объявления:</label>
                <input type="text" id="ad-title" name="title" placeholder="Продам курячі яйца" required>

                <label for="ad-price">Цена:</label>
                <input type="number" id="ad-price" name="price" required>

                <label for="ad-quantity">Количество:</label>
                <input type="number" id="ad-quantity" name="quantity" required>

                <label for="ad-unit">Единица измерения:</label>
                <select id="ad-unit" name="unit" required>
                    <option value="kg">Кілограм</option>
                    <option value="pcs">Штук</option>
                    <option value="ltr">Літр(ів)</option>
                    <option value="m">Метрів</option>
                    <option value="g">Грам</option>
                    <option value="m2">Метр2</option>
                    <option value="m3">Метр3</option>
                </select>

                <label for="ad-category">Категория:</label>
                <select id="ad-category" name="category" required>
                    <option value="auto">Авто/Мото/Вело</option>
                    <option value="clothing">Одяг, взуття та інше</option>
                    <option value="fruits">Фрукти та овочі</option>
                    <option value="grain">Зерно та корма</option>
                    <option value="food">Продукти харчування</option>
                    <option value="animals">Тварини та препарати</option>
                    <option value="tools">Интструменти та запчастини</option>
                    <option value="garden">Сад та город</option>
                    <option value="cosmetics">Косметика</option>
                    <option value="chemicals">Побутова хімія</option>
                    <option value="other">Інше</option>
                </select>

                <label for="ad-description">Описание:</label>
                <textarea id="ad-description" name="description" rows="4"></textarea>

                <label for="ad-seller-name">Имя продавца:</label>
                <input type="text" id="ad-seller-name" name="sellerName" required>

                <label for="ad-seller-phone">Номер телефона:</label>
                <input type="tel" id="ad-seller-phone" name="sellerPhone" required>

                <label for="ad-location">Район:</label>
                <select id="ad-location" name="location" required>
                    <option value="Zorya">Зоря</option>
                    <option value="Balovka">Баловка</option>
                    <option value="Loboykovka">Лобойковка</option>
                    <option value="Petrikovka">Петриковка</option>
                    <option value="Partizansk">Партизанск</option>
                    <option value="Chumaki">Чумаки</option>
                </select>

                <label for="ad-address">Адрес:</label>
                <input type="text" id="ad-address" name="address" required>

                <button type="submit">Добавить объявление</button>
            </form>
        </main>
    </div>

    <footer>
        <p>© 2024 Доска объявлений</p>
    </footer>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-storage.js"></script>
    <script src="script.js"></script>
</body>
</html>
