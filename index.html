<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Додавання оголошення</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="form-container">
        <form>
            <label for="photos">Фото (макс. 5):</label>
            <input type="file" id="photos" name="photos" accept="image/*" multiple>
            
            <label for="title">Назва оголошення:</label>
            <input type="text" id="title" name="title" placeholder="Продам курячі яйця">
            
            <label for="price">Ціна:</label>
            <div class="inline-fields">
                <input type="text" id="price" name="price" placeholder="50 ₴">
                <input type="number" id="quantity" name="quantity" placeholder="Кількість">
                <select id="unit" name="unit">
                    <option value="kg">Кілограм</option>
                    <option value="pcs">Штук</option>
                    <option value="ltr">Літр(ів)</option>
                    <option value="m">Метрів</option>
                    <option value="g">Грам</option>
                    <option value="m2">Метр2</option>
                    <option value="m3">Метр3</option>
                </select>
            </div>
            
            <div id="additional-fields-container">
                <label>Додаткові поля (макс. 15):</label>
                <div class="additional-field">
                    <input type="text" name="additional-field-name" placeholder="Назва поля">
                    <input type="text" name="additional-field-value" placeholder="Інформація">
                    <button type="button" class="remove-field">Видалити</button>
                </div>
            </div>
            <button type="button" id="add-field">Додати поле для дод. інформації</button>
            
            <label for="description">Опис:</label>
            <textarea id="description" name="description" rows="4"></textarea>
            
            <h2>Контакти продавця</h2>
            
            <label for="seller-name">Ім'я:</label>
            <input type="text" id="seller-name" name="seller-name">
            
            <label for="phone-number">Номер телефону:</label>
            <input type="tel" id="phone-number" name="phone-number">
            <div>
                <input type="checkbox" id="viber" name="messenger" value="Viber">
                <label for="viber">Вайбер</label>
                <input type="checkbox" id="telegram" name="messenger" value="Telegram">
                <label for="telegram">Телеграм</label>
                <input type="checkbox" id="whatsapp" name="messenger" value="WhatsApp">
                <label for="whatsapp">Вацап</label>
            </div>
            
            <label for="region">Я живу в:</label>
            <select id="region" name="region">
                <option value="balovka">Баловка</option>
                <option value="zorja">Зоря</option>
                <!-- Додати інші райони -->
            </select>
            
            <label for="address">За адресою:</label>
            <input type="text" id="address" name="address" placeholder="Необов'язково">
            
            <button type="submit">Додати оголошення</button>
        </form>
    </div>
    <script src="scripts.js"></script>
</body>
</html>
